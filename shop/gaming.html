<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP X | Home</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000000; /* Reverted to Pure Black */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Main Content Wrapper */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            text-align: center;
        }

        /* Logo */
        .logo-container {
            position: absolute;
            top: 40px;
            left: 40px;
        }

        .logo {
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.2em;
            text-decoration: none;
            text-transform: uppercase;
        }

        /* Gift Image */
        .gift-container img {
            max-width: 350px;
            width: 100%;
            height: auto;
            display: block;
        }

        /* Capsule/Pill Shaped Button */
        .explore-btn {
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.3em;
            padding: 18px 60px;
            border: 1px solid #ffffff;
            border-radius: 9999px; /* This creates the capsule shape */
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            display: inline-block;
        }

        .explore-btn:hover {
            background-color: #ffffff;
            color: #000000;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo-container { top: 25px; left: 25px; }
            .logo { font-size: 1.2rem; }
            .gift-container img { max-width: 280px; }
            .explore-btn { padding: 15px 45px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <a href="#" class="logo">TOP X</a>
    </div>

    <main class="main-content">
        <div class="gift-container">
            <img src="../1.gif" alt="Premium Gift Presentation">
        </div>

        <a href="shop.html" class="explore-btn">EXPLORE</a>
    </main>

</body>
</html>
