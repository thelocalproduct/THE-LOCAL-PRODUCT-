<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE AUDIO PEOPLE | ESCAPE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%); 
            color: #ffffff; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        
        .premium-font { font-family: 'Playfair Display', serif; }

        /* Platinum Gold Gradient Text Effect */
        .premium-gradient-text {
            background: linear-gradient(to right, #E5E4E2 0%, #D4AF37 50%, #E5E4E2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            white-space: nowrap;
        }

        .feature-card {
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 400px;
            background: rgba(255, 255, 255, 0.03);
            text-decoration: none;
        }

        .feature-card:hover {
            border-color: rgba(255, 255, 255, 0.8);
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .feature-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            transition: opacity 0.5s ease;
        }

        .feature-card:hover img { opacity: 0.9; }

        .card-text {
            position: absolute;
            font-size: 2.5rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-family: 'Playfair Display', serif;
            z-index: 10;
        }
    </style>
</head>
<body>

    <nav class="px-6 py-8 border-b border-white/5 flex items-center justify-between">
        <a href="../../../index.html" class="premium-font text-xl tracking-[0.2em] hover:text-gray-400 transition">TOP TEN</a>
        <h1 class="premium-font text-4xl md:text-5xl tracking-[0.2em] uppercase">ESCAPE</h1>
        <button onclick="window.history.back()" class="text-xs uppercase tracking-[0.2em] border border-white/20 px-6 py-2 hover:bg-white hover:text-black transition duration-300">Back</button>
    </nav>

    <main class="flex-grow p-6 flex flex-col items-center justify-center">
        
        <p class="premium-font text-xl md:text-2xl premium-gradient-text italic mb-16 tracking-widest text-center w-full">
            "Experience sound the way it was meant to be heard"
        </p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-5xl">
            
            <a href="audio/listen.html" class="feature-card">
                <img src="audio/coverpic/1.jpg" alt="Listen">
                <span class="card-text">LISTEN</span>
            </a>

            <a href="audio/amplify.html" class="feature-card">
                <img src="audio/coverpic/2.jpg" alt="Amplify">
                <span class="card-text">AMPLIFY</span>
            </a>

        </div>
    </main>

</body>
</html>
