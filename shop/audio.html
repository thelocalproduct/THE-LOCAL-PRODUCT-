<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE AUDIO PEOPLE | ESCAPE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%); 
            color: #ffffff; 
            min-height: 100vh; 
        }
        
        .premium-font { font-family: 'Playfair Display', serif; }

        .premium-gradient-text {
            background: linear-gradient(to right, #E5E4E2 0%, #D4AF37 50%, #E5E4E2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
        }

        .feature-card {
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1; /* Forces the card to be a perfect square */
            background: rgba(255, 255, 255, 0.03);
            text-decoration: none;
            width: 100%;
        }

        .feature-card:hover {
            border-color: rgba(255, 255, 255, 0.8);
            transform: scale(1.02);
        }

        .feature-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            transition: opacity 0.5s ease;
        }

        .feature-card:hover img { opacity: 0.9; }

        .card-text {
            position: absolute;
            font-size: 1.5rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-family: 'Playfair Display', serif;
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 w-full z-50 px-4 py-4 border-b border-white/5 flex items-center justify-between bg-[#0a0a0a]/90 backdrop-blur-md">
        <a href="../../../../index.html" class="premium-font text-lg tracking-[0.1em] hover:text-gray-400 transition">TOP TEN</a>
        <a href="../shop.html" class="text-xs md:text-sm uppercase tracking-[0.2em] border border-white/20 px-4 py-2 hover:bg-white hover:text-black transition duration-300">Back</a>
    </nav>

    <!-- Content Area -->
    <main class="min-h-screen flex flex-col items-center justify-center p-4 pt-24">
        
        <p class="premium-font text-lg md:text-2xl premium-gradient-text italic mb-10 tracking-widest text-center max-w-sm md:max-w-xl">
            "Experience sound the way it was meant to be heard"
        </p>

        <!-- Container for square cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
            
            <a href="audio/listen.html" class="feature-card">
                <img src="audio/coverpic/1.jpg" alt="Listen">
                <span class="card-text">LISTEN</span>
            </a>

            <a href="audio/amplify.html" class="feature-card">
                <img src="audio/coverpic/2.jpg" alt="Amplify">
                <span class="card-text">AMPLIFY</span>
            </a>

        </div>
    </main>

</body>
</html>
