<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE AUDIO PEOPLE | COLLECTIONS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%); 
            color: #ffffff; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden; 
        }
        
        .premium-font { font-family: 'Playfair Display', serif; }
        .text-glow-silver { text-shadow: 0 0 10px rgba(192, 192, 192, 0.6); }
        .text-glow-gold { text-shadow: 0 0 10px rgba(218, 165, 32, 0.6); }

        .platinum-card {
            aspect-ratio: 1 / 1;
            width: 100%;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: block;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
        }

        .silver-theme:hover {
            border-color: rgba(200, 200, 200, 0.8);
            box-shadow: 0 0 20px rgba(192, 192, 192, 0.3), inset 0 0 10px rgba(255, 255, 255, 0.05);
            transform: translateY(-8px);
        }

        .gold-theme:hover {
            border-color: rgba(218, 165, 32, 0.8);
            box-shadow: 0 0 20px rgba(218, 165, 32, 0.3), inset 0 0 10px rgba(255, 255, 255, 0.05);
            transform: translateY(-8px);
        }

        .card-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.85; transition: opacity 0.5s ease; }
        .platinum-card:hover .card-img { opacity: 1; }
    </style>
</head>
<body>

    <nav class="px-6 py-5 border-b border-white/5 flex items-center justify-between">
        <a href="../../../../index.html" class="premium-font text-xl md:text-2xl tracking-[0.2em] hover:text-gray-400 transition">TOP TEN</a>
        <h1 class="premium-font text-2xl md:text-3xl tracking-[0.2em] uppercase">THE AUDIO PEOPLE</h1>
        <button onclick="history.back()" class="text-sm uppercase tracking-[0.2em] border border-white/20 px-6 py-2 hover:bg-white hover:text-black transition duration-300">Back</button>
    </nav>

    <main class="flex-grow p-4 w-full max-w-7xl mx-auto flex flex-col justify-center gap-6">
        
        <section>
            <h2 class="premium-font text-xl md:text-2xl tracking-[0.3em] uppercase text-gray-300 mb-4 text-center text-glow-silver">Budget</h2>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4">
                <script>
                    for(let i=1; i<=5; i++) {
                        document.write(`
                            <a href="inear/b${i}.html" class="platinum-card silver-theme">
                                <img src="inear/images/b${i}.jpg" class="card-img" alt="Budget Item ${i}">
                            </a>
                        `);
                    }
                </script>
            </div>
        </section>

        <div class="w-1/3 h-px bg-gradient-to-r from-transparent via-gray-600 to-transparent mx-auto"></div>

        <section>
            <h2 class="premium-font text-xl md:text-2xl tracking-[0.3em] uppercase text-yellow-500 mb-4 text-center text-glow-gold">Premium</h2>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4">
                <script>
                    for(let i=1; i<=5; i++) {
                        document.write(`
                            <a href="inear/p${i}.html" class="platinum-card gold-theme">
                                <img src="inear/images/p${i}.jpg" class="card-img" alt="Premium Item ${i}">
                            </a>
                        `);
                    }
                </script>
            </div>
        </section>

    </main>
</body>
</html>
