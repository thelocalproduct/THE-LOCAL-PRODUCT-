<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP TEN | Premium Audio</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-gold: #D4AF37;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: 80px; 
            padding-bottom: 120px;
        }

        /* Top Bar */
        .top-bar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: rgba(5, 5, 5, 0.95);
            border-bottom: 1px solid var(--border-color);
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo { font-weight: bold; font-size: 1.1rem; color: var(--accent-gold); text-decoration: none; justify-self: start; }
        .page-title { font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; }
        .back-btn { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; justify-self: end; }
        .back-btn:hover { color: var(--text-main); }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        .card { 
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 30px;
            margin-bottom: 50px;
            border-radius: 20px;
        }

        .header-section { display: flex; gap: 30px; align-items: center; margin-bottom: 30px; }
        .img-wrapper { flex: 0 0 200px; }
        .product-img { width: 200px; height: 200px; object-fit: cover; border-radius: 12px; }
        .title-group { flex: 1; display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }
        
        h2 { font-size: 1.8rem; color: var(--accent-gold); }
        
        .btn-group { display: flex; gap: 10px; }
        .action-btn { 
            padding: 10px 20px; background: transparent; border: 1px solid var(--accent-gold); 
            color: var(--accent-gold); text-decoration: none; text-transform: uppercase; 
            font-size: 0.75rem; letter-spacing: 2px; border-radius: 4px; cursor: pointer; transition: 0.3s;
        }
        .action-btn:hover { background: var(--accent-gold); color: #000; }
        .action-btn.selected { background: var(--accent-gold); color: #000; }

        h3 { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-top: 20px; margin-bottom: 8px; }
        p { color: #ccc; font-size: 0.95rem; line-height: 1.6; }

        /* Compare Tray & Modal */
        #compare-tray { position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px; display: none; text-align: center; border-top: 1px solid var(--accent-gold); z-index: 2000; }
        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; padding: 40px; overflow-y: auto; z-index: 3000; }
        .comp-table { width: 100%; color: white; border-collapse: collapse; margin-top: 20px; }
        .comp-table th, .comp-table td { border: 1px solid var(--border-color); padding: 15px; vertical-align: top; }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .header-section { flex-direction: column; text-align: center; }
            .img-wrapper { flex: 0 0 auto; }
            .product-img { width: 100%; max-width: 200px; }
            .title-group { align-items: center; }
            .btn-group { flex-direction: column; width: 100%; }
            .action-btn { width: 100%; }
            #modal { padding: 20px 10px; }
            .comp-table { font-size: 0.8rem; }
        }
    </style>
</head>

    let selected = [];

    function toggleSelect(index) {
        const product = data[index];
        const btn = document.getElementById(`btn-${index}`);
        if(selected.includes(product)) {
            selected = selected.filter(p => p !== product);
            btn.classList.remove('selected');
            btn.innerText = "Compare";
        } else if(selected.length < 2) {
            selected.push(product);
            btn.classList.add('selected');
            btn.innerText = "Selected";
        }
        document.getElementById('tray-text').innerText = `Selected: ${selected.length}/2`;
        document.getElementById('compare-tray').style.display = selected.length > 0 ? 'block' : 'none';
    }

    function openModal() {
        if(selected.length < 2) return alert("Please select 2 products to compare.");
        let html = `<div style="overflow-x:auto;"><table class="comp-table"><tr><th>Feature</th><th>${selected[0].name}</th><th>${selected[1].name}</th></tr>
            <tr><td>About</td><td>${selected[0].about}</td><td>${selected[1].about}</td></tr>
            <tr><td>Specifications</td><td>${selected[0].specs}</td><td>${selected[1].specs}</td></tr>
            <tr><td>Pros & Cons</td><td>${selected[0].pc}</td><td>${selected[1].pc}</td></tr>
            <tr><td>Why Buy</td><td>${selected[0].buy}</td><td>${selected[1].buy}</td></tr></table></div>`;
        document.getElementById('modal-content').innerHTML = html;
        document.getElementById('modal').style.display = 'block';
    }

    function clearSelection() {
        selected = [];
        document.querySelectorAll('.action-btn.selected').forEach(b => { b.classList.remove('selected'); b.innerText = "Compare"; });
        document.getElementById('compare-tray').style.display = 'none';
    }

    const list = document.getElementById('product-list');
    data.forEach((p, i) => {
        list.innerHTML += `
            <div class="card">
                <div class="header-section">
                    <div class="img-wrapper"><img src="${p.img}" alt="${p.name}" class="product-img"></div>
                    <div class="title-group">
                        <h2>${i + 1}. ${p.name}</h2>
                        <div class="btn-group">
                            <a href="${p.link}" class="action-btn" target="_blank">Buy on Amazon</a>
                            <button class="action-btn" id="btn-${i}" onclick="toggleSelect(${i})">Compare</button>
                        </div>
                    </div>
                </div>
                <h3>About the Product</h3><p>${p.about}</p>
                <h3>Specifications</h3><p>${p.specs}</p>
                <h3>Pros & Cons</h3><p>${p.pc}</p>
                <h3>Why Buy</h3><p>${p.buy}</p>

        `;

</script>

</body>
