<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE AUDIO PEOPLE | COMING SOON</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@200;300;400&display=swap');

        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --accent-gold: #c4a496; /* Rose Gold/Bronze */
            --border-dim: rgba(196, 164, 150, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        .container {
            padding: 40px;
            border: 1px solid var(--border-dim);
            max-width: 600px;
            position: relative;
        }

        .container::before {
            content: "";
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border: 1px solid var(--border-dim);
            transform: scale(1.03);
            pointer-events: none;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin-bottom: 1rem;
        }

        .subtext {
            font-size: 0.9rem;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            font-weight: 300;
            color: var(--text-main);
            opacity: 0.7;
            margin-bottom: 3rem;
        }

        .coming-soon-label {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            color: var(--accent-gold);
            margin-bottom: 2rem;
        }

        .footer-nav {
            margin-top: 3rem;
        }

        .footer-nav a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            transition: opacity 0.3s;
        }

        .footer-nav a:hover {
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="coming-soon-label">Refining the experience...</div>
        <h1>coming soon</h1>
        <p class="subtext">A NEW STANDARD IN SONIC EXCELLENCE</p>
        
        <div class="footer-nav">
            <a href="javascript:history.back()">Return to previous</a>
        </div>
    </div>

</body>
</html>
