<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATEGORY | TOP TEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at center, #3e4446 0%, #202324 40%, #0a0a0a 100%); color: #ffffff; min-height: 100vh; margin: 0; display: flex; flex-direction: column; }
        h1 { font-family: 'Playfair Display', serif; }
        
        .metal-gradient { background: linear-gradient(135deg, #a8a9ad 0%, #e8e8e8 50%, #717478 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-border { border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

        .card-item { 
            background: #121212; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer; 
            transition: all 0.4s ease; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 8px;
        }
        
        /* Platinum glow on hover */
        .card-item:hover { 
            border: 1px solid #e5e4e2; 
            box-shadow: 0 0 15px rgba(229, 228, 226, 0.4);
            transform: translateY(-10px); 
        }
        
        .card-item.selected { 
            border-color: #ffffff; 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
            transform: scale(1.05) translateY(-5px);
        }

        .card-img-container {
            width: 100%;
            height: 160px;
            overflow: hidden;
            border-radius: 4px;
            background-color: #000;
        }
        
        .card-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gold-gradient-text {
            background: linear-gradient(to right, #D4AF37, #F8F9FA, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            padding: 12px 0 4px 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav class="w-full p-8 nav-border flex justify-between items-center">
        <a href="../index.html" class="flex items-center"><h1 class="metal-gradient text-3xl font-bold tracking-widest">TOP TEN</h1></a>
        <div class="flex gap-4 items-center">
            <button id="compareBtn" onclick="toggleSelectionMode()" class="text-gray-300 border border-gray-500 px-4 py-2 rounded-lg hover:text-white uppercase text-sm tracking-widest transition">COMPARE</button>
            <a href="tablet.html" class="text-gray-400 border border-white/10 px-4 py-2 rounded-lg hover:text-white uppercase text-sm tracking-widest">← Back</a>
        </div>
    </nav>

    <div id="notifyCard" class="hidden fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-50 bg-black border border-gray-400 p-8 rounded-2xl shadow-[0_0_30px_rgba(255,255,255,0.2)] text-center w-80">
        <h2 class="text-xl font-bold text-white mb-6 tracking-widest uppercase">Choose Any Two</h2>
        <button id="enterBtn" onclick="goToCompare()" class="hidden w-full bg-white text-black font-bold py-3 rounded-lg hover:bg-gray-200 transition">ENTER</button>
        <button onclick="toggleSelectionMode()" class="mt-4 text-gray-500 hover:text-white text-sm uppercase">Cancel</button>
    </div>

    <main class="flex-grow p-8 md:p-12">
        <div class="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6" id="grid">
            <div class="card-item rounded-lg" onclick="handleCardClick(this)" data-link="iostab/ios1.html" data-name="TOP 1" data-specs="Display: 10 inch | RAM: 8GB | Battery: 5000mAh">
                <div class="card-img-container"><img src="ios/images/ios1.jpg" alt="TOP 1"></div>
                <h3 class="gold-gradient-text uppercase text-sm tracking-widest">TOP 1</h3>
            </div>
            <div class="card-item rounded-lg" onclick="handleCardClick(this)" data-link="iostab/ios2.html" data-name="TOP 2" data-specs="Display: 11 inch | RAM: 16GB | Battery: 6000mAh">
                <div class="card-img-container"><img src="ios/images/ios2.jpg" alt="TOP 2"></div>
                <h3 class="gold-gradient-text uppercase text-sm tracking-widest">TOP 2</h3>
            </div>
            <div class="card-item rounded-lg" onclick="handleCardClick(this)" data-link="iostab/ios3.html" data-name="TOP 3" data-specs="Display: 12 inch | RAM: 8GB | Battery: 7000mAh">
                <div class="card-img-container"><img src="ios/images/ios3.jpg" alt="TOP 3"></div>
                <h3 class="gold-gradient-text uppercase text-sm tracking-widest">TOP 3</h3>
            </div>
            <div class="card-item rounded-lg" onclick="handleCardClick(this)" data-link="iostab/ios4.html" data-name="TOP 4" data-specs="Display: 10.5 inch | RAM: 12GB | Battery: 5500mAh">
                <div class="card-img-container"><img src="ios/images/ios4.jpg" alt="TOP 4"></div>
                <h3 class="gold-gradient-text uppercase text-sm tracking-widest">TOP 4</h3>
            </div>
            <div class="card-item rounded-lg" onclick="handleCardClick(this)" data-link="iostab/ios5.html" data-name="TOP 5" data-specs="Display: 9.7 inch | RAM: 8GB | Battery: 4500mAh">
                <div class="card-img-container"><img src="ios/images/ios5.jpg" alt="TOP 5"></div>
                <h3 class="gold-gradient-text uppercase text-sm tracking-widest">TOP 5</h3>
            </div>
            <div class="card-item rounded-lg" onclick="handleCardClick(this)" data-link="iostab/ios6.html" data-name="TOP 6" data-specs="Display: 11.5 inch | RAM: 16GB | Battery: 6500mAh">
                <div class="card-img-container"><img src="ios/images/ios6.jpg" alt="TOP 6"></div>
                <h3 class="gold-gradient-text uppercase text-sm tracking-widest">TOP 6</h3>
            </div>
            <div class="card-item rounded-lg" onclick="handleCardClick(this)" data-link="iostab/ios7.html" data-name="TOP 7" data-specs="Display: 10 inch | RAM: 8GB | Battery: 5200mAh">
                <div class="card-img-container"><img src="ios/images/ios7.jpg" alt="TOP 7"></div>
                <h3 class="gold-gradient-text uppercase text-sm tracking-widest">TOP 7</h3>
            </div>
            <div class="card-item rounded-lg" onclick="handleCardClick(this)" data-link="iostab/ios8.html" data-name="TOP 8" data-specs="Display: 12.9 inch | RAM: 16GB | Battery: 8000mAh">
                <div class="card-img-container"><img src="ios/images/ios8.jpg" alt="TOP 8"></div>
                <h3 class="gold-gradient-text uppercase text-sm tracking-widest">TOP 8</h3>
            </div>
            <div class="card-item rounded-lg" onclick="handleCardClick(this)" data-link="iostab/ios9.html" data-name="TOP 9" data-specs="Display: 8.3 inch | RAM: 8GB | Battery: 4000mAh">
                <div class="card-img-container"><img src="ios/images/ios9.jpg" alt="TOP 9"></div>
                <h3 class="gold-gradient-text uppercase text-sm tracking-widest">TOP 9</h3>
            </div>
            <div class="card-item rounded-lg" onclick="handleCardClick(this)" data-link="iostab/ios10.html" data-name="TOP 10" data-specs="Display: 10.9 inch | RAM: 12GB | Battery: 5800mAh">
                <div class="card-img-container"><img src="ios/images/ios10.jpg" alt="TOP 10"></div>
                <h3 class="gold-gradient-text uppercase text-sm tracking-widest">TOP 10</h3>
            </div>
        </div>
    </main>

    <script>
        let isSelectionMode = false;
        let selected = [];

        function handleCardClick(card) {
            if (isSelectionMode) {
                toggleSelect(card);
            } else {
                window.location.href = card.dataset.link;
            }
        }

        function toggleSelectionMode() {
            isSelectionMode = !isSelectionMode;
            document.getElementById('notifyCard').classList.toggle('hidden', !isSelectionMode);
            if (!isSelectionMode) {
                selected.forEach(c => c.classList.remove('selected'));
                selected = [];
                document.getElementById('enterBtn').classList.add('hidden');
            }
        }

        function toggleSelect(card) {
            if (card.classList.contains('selected')) {
                card.classList.remove('selected');
                selected = selected.filter(item => item !== card);
            } else if (selected.length < 2) {
                card.classList.add('selected');
                selected.push(card);
            }
            document.getElementById('enterBtn').classList.toggle('hidden', selected.length !== 2);
        }

        function goToCompare() {
            const data = selected.map(card => ({ name: card.dataset.name, specs: card.dataset.specs }));
            localStorage.setItem('compareData', JSON.stringify(data));
            window.location.href = 'compare.html';
        }
    </script>
</body>
</html>
