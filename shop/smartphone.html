<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMARTPHONE | TECH TEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Inter:wght@300;400;600&display=swap');
        
        ::-webkit-scrollbar { display: none; }
        body { scrollbar-width: none; -ms-overflow-style: none; }

        body { 
            font-family: 'Inter', sans-serif; color: #ffffff; min-height: 100vh; 
            margin: 0; display: flex; flex-direction: column; overflow: hidden; 
        }

        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('../images/smartphonebg.jpg');
            background-size: cover; background-position: center;
            filter: blur(8px) brightness(0.5); z-index: -1;
        }

        h1 { font-family: 'Playfair Display', serif; }
        
        .metal-gradient { background: linear-gradient(135deg, #a8a9ad 0%, #e8e8e8 50%, #717478 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .gold-gradient { 
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }
        
        .quote-title { font-family: 'Playfair Display', serif; font-style: italic; }
        
        .silver-border { 
            border: 2px solid transparent;
            background-image: linear-gradient(#121212, #121212), linear-gradient(to bottom right, #a8a9ad, #e8e8e8, #717478);
            background-origin: border-box; background-clip: padding-box, border-box;
        }

        .category-item { border: 1px solid rgba(255, 255, 255, 0.15); transition: all 0.3s ease; }
        .category-item:hover { border-color: #bf953f; box-shadow: 0 0 15px rgba(191, 149, 63, 0.5); transform: scale(1.02); }

        .nav-border { border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .card-container { display: none; }

        @media (max-width: 768px) {
            body { overflow-y: auto; }
            .sidebar-content { display: none; }
            .mobile-menu-active { display: block !important; }
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <nav class="w-full p-8 nav-border grid grid-cols-3 items-center">
        <a href="/index.html" class="flex items-center">
            <h1 class="metal-gradient text-3xl font-bold tracking-widest">TECH TEN</h1>
        </a>
        <h2 id="category-title" class="text-center font-bold text-2xl tracking-widest gold-gradient uppercase"></h2>
        <div class="text-right">
            <a href="/shop.html" class="text-gray-400 hover:text-white transition uppercase text-sm tracking-widest border border-white/10 px-4 py-2 rounded-lg hover:border-white/30">← Back</a>
        </div>
    </nav>

    <div class="flex flex-col md:flex-row w-full h-[calc(100vh-120px)]">
        <aside class="w-full md:w-64 border-r border-white/5 p-8 flex-shrink-0 overflow-y-auto">
            <button onclick="toggleMobileMenu()" class="md:hidden w-full text-center py-4 text-gray-400 border border-white/10 rounded-lg mb-4 uppercase tracking-widest">
                Select Price Range
            </button>
            
            <div id="mobile-menu" class="sidebar-content md:block">
                <h3 class="text-[#a8a9ad] font-bold uppercase tracking-widest mb-8 border-b border-white/5 pb-4 text-center">Price Range</h3>
                <ul class="space-y-3">
                    <li class="category-item rounded-lg flex items-center justify-center"><button onclick="toggleGroup('range1', 1, 10, 'TOP TEN UNDER 10,000')" class="w-full h-full p-3 text-gray-400 hover:text-white transition text-center flex items-center justify-center text-sm">BELOW 10,000</button></li>
                    <li class="category-item rounded-lg flex items-center justify-center"><button onclick="toggleGroup('range2', 11, 20, 'TOP TEN UNDER 20,000')" class="w-full h-full p-3 text-gray-400 hover:text-white transition text-center flex items-center justify-center text-sm">10,000 - 20,000</button></li>
                    <li class="category-item rounded-lg flex items-center justify-center"><button onclick="toggleGroup('range3', 21, 30, 'TOP TEN UNDER 30,000')" class="w-full h-full p-3 text-gray-400 hover:text-white transition text-center flex items-center justify-center text-sm">20,000 - 30,000</button></li>
                    <li class="category-item rounded-lg flex items-center justify-center"><button onclick="toggleGroup('range4', 31, 40, 'TOP TEN UNDER 40,000')" class="w-full h-full p-3 text-gray-400 hover:text-white transition text-center flex items-center justify-center text-sm">30,000 - 40,000</button></li>
                    <li class="category-item rounded-lg flex items-center justify-center"><button onclick="toggleGroup('range5', 41, 50, 'TOP TEN UNDER 50,000')" class="w-full h-full p-3 text-gray-400 hover:text-white transition text-center flex items-center justify-center text-sm">40,000 - 50,000</button></li>
                    <li class="category-item rounded-lg flex items-center justify-center"><button onclick="toggleGroup('range6', 51, 60, 'TOP TEN UNDER 60,000')" class="w-full h-full p-3 text-gray-400 hover:text-white transition text-center flex items-center justify-center text-sm">50,000 - 60,000</button></li>
                    <li class="category-item rounded-lg flex items-center justify-center"><button onclick="toggleGroup('range7', 61, 70, 'TOP TEN UNDER 70,000')" class="w-full h-full p-3 text-gray-400 hover:text-white transition text-center flex items-center justify-center text-sm">60,000 - 70,000</button></li>
                    <li class="category-item rounded-lg flex items-center justify-center"><button onclick="toggleGroup('range8', 71, 80, 'TOP TEN UNDER 80,000')" class="w-full h-full p-3 text-gray-400 hover:text-white transition text-center flex items-center justify-center text-sm">70,000 - 80,000</button></li>
                    <li class="category-item rounded-lg flex items-center justify-center"><button onclick="toggleGroup('range9', 81, 90, 'TOP TEN UNDER 90,000')" class="w-full h-full p-3 text-gray-400 hover:text-white transition text-center flex items-center justify-center text-sm">80,000 - 90,000</button></li>
                    <li class="category-item rounded-lg flex items-center justify-center"><button onclick="toggleGroup('range10', 91, 100, 'TOP TEN UNDER 100,000')" class="w-full h-full p-3 text-gray-400 hover:text-white transition text-center flex items-center justify-center text-sm">90,000 - 100,000</button></li>
                    <li class="category-item rounded-lg flex items-center justify-center"><button onclick="toggleGroup('range11', 101, 110, 'TOP TEN ABOVE 100,000')" class="w-full h-full p-3 text-gray-400 hover:text-white transition text-center flex items-center justify-center text-sm">ABOVE 100,000</button></li>
                </ul>
            </div>
        </aside>

        <main class="flex-grow p-4 md:p-8 overflow-y-auto relative flex flex-col">
            <div id="home-content" class="text-center w-full mt-0 md:mt-20">
                <h2 class="quote-title text-4xl font-bold gold-gradient leading-tight mb-12">
                    "Top Ten Smartphones Across Every Budget.<br>One Perfect Choice for Everyone."
                </h2>
                <div class="grid grid-cols-2 md:grid-cols-5 gap-8 max-w-4xl mx-auto">
                    <script>
                        for(let i=1; i<=10; i++) {
                            document.write(`
                                <div class="silver-border w-32 h-32 md:w-32 md:h-32 rounded-full mx-auto overflow-hidden flex items-center justify-center cursor-pointer transition-transform hover:scale-110">
                                    <img src="../images/logo/logo${i}.jpg" alt="Brand ${i}" class="w-full h-full object-cover">
                                </div>
                            `);
                        }
                    </script>
                </div>
            </div>

            <div id="range1" class="card-container grid grid-cols-2 md:grid-cols-5 gap-6 w-full flex-grow"></div>
            <div id="range2" class="card-container grid grid-cols-2 md:grid-cols-5 gap-6 w-full flex-grow"></div>
            <div id="range3" class="card-container grid grid-cols-2 md:grid-cols-5 gap-6 w-full flex-grow"></div>
            <div id="range4" class="card-container grid grid-cols-2 md:grid-cols-5 gap-6 w-full flex-grow"></div>
            <div id="range5" class="card-container grid grid-cols-2 md:grid-cols-5 gap-6 w-full flex-grow"></div>
            <div id="range6" class="card-container grid grid-cols-2 md:grid-cols-5 gap-6 w-full flex-grow"></div>
            <div id="range7" class="card-container grid grid-cols-2 md:grid-cols-5 gap-6 w-full flex-grow"></div>
            <div id="range8" class="card-container grid grid-cols-2 md:grid-cols-5 gap-6 w-full flex-grow"></div>
            <div id="range9" class="card-container grid grid-cols-2 md:grid-cols-5 gap-6 w-full flex-grow"></div>
            <div id="range10" class="card-container grid grid-cols-2 md:grid-cols-5 gap-6 w-full flex-grow"></div>
            <div id="range11" class="card-container grid grid-cols-2 md:grid-cols-5 gap-6 w-full flex-grow"></div>
        </main>
    </div>

    <script>
        function toggleMobileMenu() {
            document.getElementById('mobile-menu').classList.toggle('mobile-menu-active');
        }

        function toggleGroup(id, start, end, title) {
            const container = document.getElementById(id);
            const titleElement = document.getElementById('category-title');
            const homeContent = document.getElementById('home-content');
            
            if (container.innerHTML.trim() === '') {
                for (let i = start; i <= end; i++) {
                    container.innerHTML += `
                        <a href="smartphone/data/sp${i}.html" class="silver-border min-h-[150px] md:min-h-[200px] rounded-xl flex items-center justify-center transition-all duration-300 hover:scale-105 hover:shadow-[0_0_20px_rgba(192,192,192,0.3)] cursor-pointer relative overflow-hidden">
                            <img src="smartphone/images/sp${i}.jpg" alt="Smartphone ${i}" class="absolute inset-0 w-full h-full object-cover">
                        </a>
                    `;
                }
            }

            const isCurrentlyShown = container.style.display === 'grid';
            
            document.querySelectorAll('.card-container').forEach(c => { c.style.display = 'none'; });
            
            if (!isCurrentlyShown) {
                titleElement.innerText = title;
                container.style.display = 'grid';
                homeContent.style.display = 'none';
                if (window.innerWidth <= 768) {
                    document.getElementById('mobile-menu').classList.remove('mobile-menu-active');
                }
            } else {
                titleElement.innerText = '';
                homeContent.style.display = 'block';
            }
        }
    </script>
</body>
</html>
