<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE AUDIO PEOPLE | COLLECTIONS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: #ffffff; }
        .premium-font { font-family: 'Playfair Display', serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; }
        @media (max-width: 767px) { #mobile-menu { transition: transform 0.3s ease-in-out; } .hidden-menu { transform: translateX(-100%); } }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- Top Bar -->
    <nav class="fixed top-0 left-0 w-full z-50 px-6 py-4 border-b border-white/10 flex items-center justify-between bg-[#0a0a0a]/80 backdrop-blur-lg">
        <button id="menu-btn" class="md:hidden text-white uppercase text-[10px] tracking-widest border border-white/20 px-3 py-1">Menu</button>
        <a href="../../../index.html" class="premium-font text-xl md:text-2xl tracking-[0.2em]">TECH TEN</a>
        <h1 class="premium-font text-sm md:text-xl tracking-[0.1em] uppercase hidden sm:block">Top ten under 30k</h1>
        <a href="../../../shop.html" class="text-xs uppercase tracking-[0.2em] border border-white/20 px-6 py-2 hover:bg-white hover:text-black transition duration-300">Back</a>
    </nav>

    <!-- Sidebar -->
    <aside id="mobile-menu" class="fixed left-0 top-[73px] h-[calc(100vh-73px)] w-64 border-r border-white/10 bg-[#0a0a0a] p-3 z-40 hidden-menu md:translate-x-0 md:flex flex-col justify-evenly">
        <h2 class="premium-font text-gray-400 uppercase tracking-[0.1em] text-center text-xs pb-2 border-b border-white/10">Categories</h2>
        <div class="flex flex-col flex-grow justify-evenly">
            <a href="1.html" class="block border border-white/10 bg-white/5 hover:bg-white/10 py-2.5 transition-all group"><span class="block text-xs font-semibold tracking-wider group-hover:text-yellow-500 text-center">Below 10,000</span></a>
            <a href="2.html" class="block border border-white/10 bg-white/5 hover:bg-white/10 py-2.5 transition-all group"><span class="block text-xs font-semibold tracking-wider group-hover:text-yellow-500 text-center">10K - 20K</span></a>
            <a href="3.html" class="block border border-white/10 bg-white/5 hover:bg-white/10 py-2.5 transition-all group"><span class="block text-xs font-semibold tracking-wider group-hover:text-yellow-500 text-center">20K - 30K</span></a>
            <a href="4.html" class="block border border-white/10 bg-white/5 hover:bg-white/10 py-2.5 transition-all group"><span class="block text-xs font-semibold tracking-wider group-hover:text-yellow-500 text-center">30K - 40K</span></a>
            <a href="5.html" class="block border border-white/10 bg-white/5 hover:bg-white/10 py-2.5 transition-all group"><span class="block text-xs font-semibold tracking-wider group-hover:text-yellow-500 text-center">40K - 50K</span></a>
            <a href="6.html" class="block border border-white/10 bg-white/5 hover:bg-white/10 py-2.5 transition-all group"><span class="block text-xs font-semibold tracking-wider group-hover:text-yellow-500 text-center">50K - 60K</span></a>
            <a href="7.html" class="block border border-white/10 bg-white/5 hover:bg-white/10 py-2.5 transition-all group"><span class="block text-xs font-semibold tracking-wider group-hover:text-yellow-500 text-center">60K - 70K</span></a>
            <a href="8.html" class="block border border-white/10 bg-white/5 hover:bg-white/10 py-2.5 transition-all group"><span class="block text-xs font-semibold tracking-wider group-hover:text-yellow-500 text-center">70K - 80K</span></a>
            <a href="9.html" class="block border border-white/10 bg-white/5 hover:bg-white/10 py-2.5 transition-all group"><span class="block text-xs font-semibold tracking-wider group-hover:text-yellow-500 text-center">80K - 90K</span></a>
            <a href="10.html" class="block border border-white/10 bg-white/5 hover:bg-white/10 py-2.5 transition-all group"><span class="block text-xs font-semibold tracking-wider group-hover:text-yellow-500 text-center">90K - 100K</span></a>
            <a href="11.html" class="block border border-white/10 bg-white/5 hover:bg-white/10 py-2.5 transition-all group"><span class="block text-xs font-bold tracking-wider group-hover:text-yellow-500 text-center">ABOVE 1 LAKH</span></a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="ml-0 md:ml-64 flex-1 p-2 pt-20 overflow-y-auto">
        <div class="grid grid-cols-1 xl:grid-cols-2 gap-2">
            <script>
                const linksData = [
                    [{name:"Amazon", url:"https://amazon.in"}, {name:"Flipkart", url:"https://amazon.in"}, {name:"Reliance", url:"#"}, {name:"Croma", url:"https://amazon.in"}, {name:"Official", url:"https://amazon.in"}],
                    [{name:"Amazon", url:"#"}, {name:"Flipkart", url:"#"}, {name:"Reliance", url:"#"}, {name:"Croma", url:"#"}, {name:"Official", url:"#"}],
                    [{name:"Amazon", url:"#"}, {name:"Flipkart", url:""}, {name:"Reliance", url:""}, {name:"Croma", url:""}, {name:"Official", url:"#"}],
                    [{name:"Amazon", url:"#"}, {name:"Flipkart", url:"#"}, {name:"Reliance", url:"#"}, {name:"Croma", url:"#"}, {name:"Official", url:"#"}],
                    [{name:"Amazon", url:"#"}, {name:"Flipkart", url:"#"}, {name:"Reliance", url:"https://amazon.in"}, {name:"Croma", url:"#"}, {name:"Official", url:"#"}],
                    [{name:"Amazon", url:""}, {name:"Flipkart", url:""}, {name:"Reliance", url:"#"}, {name:"Croma", url:""}, {name:"Official", url:""}],
                    [{name:"Amazon", url:"#"}, {name:"Flipkart", url:"#"}, {name:"Reliance", url:""}, {name:"Croma", url:""}, {name:"Official", url:"#"}],
                    [{name:"Amazon", url:"#"}, {name:"Flipkart", url:"#"}, {name:"Reliance", url:"#"}, {name:"Croma", url:"#"}, {name:"Official", url:"#"}],
                    [{name:"Amazon", url:"https://amazon.in"}, {name:"Flipkart", url:"#"}, {name:"Reliance", url:"v"}, {name:"Croma", url:"#"}, {name:"Official", url:""}],
                    [{name:"Amazon", url:"#"}, {name:"Flipkart", url:"#"}, {name:"Reliance", url:"#"}, {name:"Croma", url:"#"}, {name:"Official", url:"#"}]
                ];

                for(let i = 0; i < 10; i++) {
                    const buttons = linksData[i]
                        .filter(l => l.url !== "" && l.url !== "#")
                        .map(l => `<button onclick="window.location.href='${l.url}'" class="flex-1 border border-white/20 py-2 text-[11px] uppercase hover:bg-white hover:text-black transition">${l.name}</button>`)
                        .join('');
                    
                    document.write(`
                        <div class="bg-[#0f0f0f] border border-white/10 hover:border-yellow-500/50 transition-all flex flex-col h-auto">
                            <div class="flex flex-col md:flex-row gap-4 p-4">
                                <img src="smartphone/images/${i+1}.jpg" class="aspect-square w-full md:w-64 bg-white/5 flex-shrink-0 object-cover" alt="Product ${i+1}">
                                <div class="w-full flex flex-col">
                                    <h3 class="text-2xl md:text-3xl uppercase tracking-widest mb-4 text-center">Product ${i+1}</h3>
                                    <div class="grid grid-cols-2 gap-x-4 gap-y-2 text-[12px] text-gray-400">
                                        ${Array(10).fill('<div>• Specification Point</div>').join('')}
                                    </div>
                                    <div class="mt-4 text-[11px]">
                                        <div class="text-green-500 font-bold mb-1">PROS:</div>
                                        <div class="text-gray-400">• Pros point one</div>
                                        <div class="text-gray-400">• Pros point two</div>
                                        <div class="text-gray-400">• Pros point three</div>
                                        <div class="text-red-500 font-bold mt-2 mb-1">CONS:</div>
                                        <div class="text-gray-400">• Cons point one</div>
                                        <div class="text-gray-400">• Cons point two</div>
                                        <div class="text-gray-400">• Cons point three</div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="text-[12px] md:text-[14px] text-gray-400 space-y-2 border-y border-white/5 py-4 px-4">
                                <div>• First descriptive line about the device</div>
                                <div>• Second descriptive line about the device</div>
                                <div>• Third descriptive line about the device</div>
                                <div>• Fourth descriptive line about the device</div>
                                <div>• Fifth descriptive line about the device</div>
                            </div>

                            <div class="flex gap-1 w-full p-4 mt-auto">
                                ${buttons}
                            </div>
                        </div>
                    `);
                }
            </script>
        </div>
    </main>

    <script>
        const menuBtn = document.getElementById('menu-btn');
        const sidebar = document.getElementById('mobile-menu');
        menuBtn.addEventListener('click', () => { sidebar.classList.toggle('hidden-menu'); });
    </script>
</body>
</html>
