<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylist</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --surface-color: #171717;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --accent-gold: #d4af37;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1.title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 30%, #a1a1a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        .upload-container {
            display: flex;
            gap: 12px;
            align-items: center;
            background: var(--surface-color);
            padding: 8px 8px 8px 20px;
            border-radius: 100px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .upload-container input[type="file"] {
            display: none;
        }

        .upload-label {
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .upload-btn {
            background: var(--text-primary);
            color: var(--bg-color);
            border: none;
            padding: 10px 24px;
            border-radius: 100px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .upload-btn:hover {
            background: var(--accent-gold);
            transform: scale(1.02);
        }

        /* Collage Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1200px;
            margin-top: 50px;
        }

        .photo-card {
            position: relative;
            background: var(--surface-color);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            aspect-ratio: 3/4;
            cursor: pointer;
            transition: var(--transition);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s forwards;
        }

        .photo-card:hover {
            transform: translateY(-6px);
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .photo-card:hover img {
            transform: scale(1.05);
        }

        /* Interactive Modal Pop-up */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            position: relative;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 90vw;
            max-height: 90vh;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            transform: scale(0.95);
            transition: var(--transition);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-content img {
            max-height: 60vh;
            max-width: 100%;
            border-radius: 12px;
            object-fit: contain;
            margin-bottom: 24px;
        }

        /* 5 Navigational Buttons Container */
        .nav-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .nav-btn:hover {
            background: var(--text-primary);
            color: var(--bg-color);
            border-color: var(--text-primary);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .close-modal:hover {
            color: var(--text-primary);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="title">Stylist</h1>
        <div class="upload-container">
            <span class="upload-label" id="fileLabel">Add outfit combination...</span>
            <input type="file" id="imageInput" accept="image/*" multiple>
            <button class="upload-btn" onclick="document.getElementById('imageInput').click()">Upload</button>
        </div>
    </header>

    <!-- Dynamic Photo Grid (Hidden until pictures are added) -->
    <main class="gallery-grid" id="galleryGrid"></main>

    <!-- Pop-up Modal Container -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <button class="close-modal" id="closeModal">&times;</button>
            <img id="modalImage" src="" alt="Selected Style">
            <div class="nav-buttons">
                <button class="nav-btn" onclick="handleNavClick(1)">1</button>
                <button class="nav-btn" onclick="handleNavClick(2)">2</button>
                <button class="nav-btn" onclick="handleNavClick(3)">3</button>
                <button class="nav-btn" onclick="handleNavClick(4)">4</button>
                <button class="nav-btn" onclick="handleNavClick(5)">5</button>
            </div>
        </div>
    </div>

    <script>
        let imageCounter = 1;
        const imageInput = document.getElementById('imageInput');
        const fileLabel = document.getElementById('fileLabel');
        const galleryGrid = document.getElementById('galleryGrid');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalImage = document.getElementById('modalImage');
        const closeModal = document.getElementById('closeModal');

        // Handle file input selection UI updates and adding images
        imageInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (files.length > 0) {
                fileLabel.textContent = `${files.length} file(s) selected`;
                
                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        createPhotoCard(event.target.result);
                    }
                    reader.readAsDataURL(file);
                });
            }
        });

        // Function to create and inject a photo card item matching the naming rule
        function createPhotoCard(imageSrc) {
            // Simulated naming convention format: stylist/1.jpg, 2.jpg...
            const imageName = `stylist/${imageCounter}.jpg`;
            imageCounter++;

            const card = document.createElement('div');
            card.className = 'photo-card';
            
            const img = document.createElement('img');
            img.src = imageSrc;
            img.alt = imageName;

            card.appendChild(img);

            // Open modal popup when picture is clicked
            card.addEventListener('click', () => {
                modalImage.src = imageSrc;
                modalOverlay.classList.add('active');
            });

            galleryGrid.appendChild(card);
        }

        // Close Modal events
        closeModal.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
        });

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                modalOverlay.classList.remove('active');
            }
        });

        // Action placeholder for the 5 navigational buttons
        function handleNavClick(buttonNumber) {
            alert(`Navigational Action ${buttonNumber} triggered for this combination.`);
        }
    </script>
</body>
</html>
