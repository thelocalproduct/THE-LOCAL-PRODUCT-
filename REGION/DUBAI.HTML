<!DOCTYPE html>
<html lang="en">
<head>

    <style>

        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #ffffff; }
        h1, h2 { font-family: 'Playfair Display', serif; }
        .nav-link { font-size: 0.70rem; letter-spacing: 0.2em; text-transform: uppercase; color: #222222; transition: color 0.3s; cursor: pointer; }

<body>

    <header class="w-full px-6 pt-8 pb-8 flex flex-col items-center bg-white">

            <!-- Country Dropdown with Navigation -->
            <div class="relative w-36"

                <button @click="open = !open" class="nav-link flex items-center justify-center gap-2 focus:outline-none w-full">

                    <img src="https://flagicons.lipis.dev/flags/4x3/ae.svg" class="w-4 h-3 object-cover">

                    <span>▾</span>

                <div x-show="open" class="absolute top-full left-0 mt-2 w-full bg-white border border-gray-200 shadow-lg py-2 z-50">
                    <a href="../index.html" class="flex items-center gap-2 px-4 py-2 text-[10px] hover:bg-gray-100 uppercase"><img src="https://flagicons.lipis.dev/flags/4x3/in.svg" class="w-4 h-3"> India</a>
                    <a href="uk.html" class="flex items-center gap-2 px-4 py-2 text-[10px] hover:bg-gray-100 uppercase"><img src="https://flagicons.lipis.dev/flags/4x3/gb.svg" class="w-4 h-3"> UK</a>

                    <a href="qatar.html" class="flex items-center gap-2 px-4 py-2 text-[10px] hover:bg-gray-100 uppercase"><img src="https://flagicons.lipis.dev/flags/4x3/qa.svg" class="w-4 h-3"> Qatar</a>
                </div>
            </div>

            <a href="deal.html" class="nav-link">Deal of Today</a>
            <a href="about.html" class="nav-link">About</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="w-full bg-[#222222] text-white flex items-center justify-center min-h-[400px]">
        <h2 class="text-4xl md:text-6xl font-normal italic">Coming Soon</h2>
    </main>

</html>
