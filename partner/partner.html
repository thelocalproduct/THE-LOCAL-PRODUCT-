    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:wght@700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #000; margin: 0; display: flex; }
        
        /* Sidebar Styling */
        .sidebar { 
            width: 350px; height: 100vh; position: fixed; left: 0; top: 0; 
            background: #0a0a0a; color: #ffffff; padding: 40px; 
            display: flex; flex-direction: column; z-index: 10;
        }
        
        .main-content { margin-left: 350px; width: calc(100% - 350px); padding: 40px; background-color: #ffffff; }
        
        h1 { font-family: 'Playfair Display', serif; }
        .text-neon-green { color: #ccff00; }
        
        .back-btn { 
            display: inline-block; border: 1px solid #333; color: #fff; padding: 8px 20px; 
            font-size: 12px; letter-spacing: 0.2em; margin-bottom: 40px; transition: 0.3s; 
        }
        .back-btn:hover { background: #fff; color: #000; border-color: #fff; }
        
        .description { font-size: 0.85rem; color: #888; line-height: 1.6; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
        
        .partner-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
        
        .partner-item { 
            background-color: #ffffff; height: 100px; display: flex; 
            align-items: center; justify-content: center; padding: 10px; transition: transform 0.3s; 
        }
        .partner-item:hover { transform: translateY(-5px); }
        
        .logo-img { max-width: 80%; max-height: 80%; object-fit: contain; opacity: 0.8; transition: 0.4s; }
        .partner-item:hover .logo-img { opacity: 1; transform: scale(1.05); }

        /* Mobile Optimization: Top Bar */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100%; height: auto; position: relative; 
                padding: 20px; text-align: center; align-items: center;
            }
            .sidebar .w-16 { margin: 10px auto; } /* Center the line */
            .main-content { margin-left: 0; width: 100%; padding: 20px; }
            .partner-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .description { max-width: 500px; margin: 20px auto; }
        }
        
        @media (max-width: 480px) {
            .partner-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
