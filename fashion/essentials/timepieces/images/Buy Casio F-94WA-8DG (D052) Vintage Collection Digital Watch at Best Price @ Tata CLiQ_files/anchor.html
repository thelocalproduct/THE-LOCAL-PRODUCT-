}

.body[style*="background-color: rgb(254, 254, 254) !important"] *:not(a) {

}

}

}
img[id^="platop"] {

}
.chr-full-bleed-hero {

}

body,
img,
[role="img"],
video,
iframe,
#gb,
a[href^="https://shopping.google.com"][href*="/lists"] > span {
