<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --surface-color: #171717;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --accent-gold: #d4af37;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding-top: 120px;
            padding-bottom: 40px;
            padding-left: 20px;
            padding-right: 20px;
        }

        /* Collage Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1200px;
            margin-top: 20px;
        }

        .photo-card {
            position: relative;
            background: var(--surface-color);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            aspect-ratio: 9/16;
            cursor: pointer;
            transition: var(--transition);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s forwards;
        }

        .photo-card:hover {
            transform: translateY(-6px);
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .photo-card:hover img {
            transform: scale(1.05);
        }

        /* Interactive Modal Pop-up */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            position: relative;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 90vw;
            max-height: 90vh;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            transform: scale(0.95);
            transition: var(--transition);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-content img {
            max-height: 65vh;
            max-width: 100%;
            border-radius: 12px;
            object-fit: contain;
            margin-bottom: 24px;
        }

        /* Navigational Affiliate Buttons Container */
        .nav-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 100px;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition);
            display: inline-block;
            text-align: center;
        }

        .nav-btn:hover {
            background: var(--text-primary);
            color: var(--bg-color);
            border-color: var(--text-primary);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .close-modal:hover {
            color: var(--text-primary);
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

        function loadImagesAutomatically() {
            let i = 1;
            const maxImages = 20; 

            function checkNextImage() {
                if (i > maxImages) return;
                
                const displayPath = `images/${i}.jpg`;
                const imgIndex = i; 
                const imgTest = new Image();
                
                imgTest.onload = function() {
                    createPhotoCard(displayPath, imgIndex);
                    i++;
                    checkNextImage();
                };
                
                imgTest.onerror = function() {
                    return; 
                };
                
                imgTest.src = displayPath;
            }

            checkNextImage();
        }

        function createPhotoCard(imageSrc, index) {
            const card = document.createElement('div');
            card.className = 'photo-card';
            
            const img = document.createElement('img');
            img.src = imageSrc;
            img.alt = imageSrc;

            card.appendChild(img);

            card.addEventListener('click', () => {
                modalImage.src = imageSrc;
                
                const links = affiliateData[index] || {};
                let buttonsHTML = '';
                
                const buttonConfigs = [
                    { key: 'shirt', label: 'Shirt' },
                    { key: 'pant', label: 'Pant' },
                    { key: 'tshirt', label: 'T-Shirt' },
                    { key: 'shoe', label: 'Shoe' },
                    { key: 'accessory', label: 'Accessory' }
                ];

                buttonConfigs.forEach(btn => {
                    const url = links[btn.key];
                    if (url && url.trim() !== "" && url !== "#") {
                        buttonsHTML += `<a href="${url}" target="_blank" class="nav-btn">${btn.label}</a>`;
                    }
                });

                modalNavButtons.innerHTML = buttonsHTML;
                modalOverlay.classList.add('active');
            });

            galleryGrid.appendChild(card);
        }

        window.addEventListener('DOMContentLoaded', loadImagesAutomatically);

        closeModal.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
        });

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                modalOverlay.classList.remove('active');
            }
        });
