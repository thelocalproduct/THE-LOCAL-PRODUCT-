<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOCAL PRODUCT | Collections</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; width: 100vw; background-color: #ffffff; overflow-x: hidden;
        }

        .bg-premium {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('fashion/background.jpg') center/cover no-repeat; z-index: -1;
        }
        
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 26, 28, 0.6); z-index: -1;
        }

        /* Premium Curtain Reveal Animation */
        .curtain {
            position: fixed; top: 0; width: 50%; height: 100%; background: #1a1a1c;
            z-index: 100; transition: transform 1.5s cubic-bezier(0.77, 0, 0.175, 1);
        }
        #curtain-left { left: 0; }
        #curtain-right { right: 0; }
        
        .loaded #curtain-left { transform: translateX(-100%); }
        .loaded #curtain-right { transform: translateX(100%); }
        
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        .nav-link { 
            font-size: 0.70rem; letter-spacing: 0.2em; text-transform: uppercase; 
            color: #4a4a4a; transition: color 0.3s; 
        }
        .nav-link:hover { color: #000000; }
        
        #sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>

    <!-- Curtain Reveal Elements -->
    <div id="curtain-left" class="curtain"></div>
    <div id="curtain-right" class="curtain"></div>

    <div class="bg-premium"></div>
    <div class="bg-overlay"></div>

    <header class="fixed top-0 left-0 w-full px-6 pt-8 pb-8 flex justify-between items-center bg-white border-b border-gray-200 z-50">
    <button id="menu-btn" class="focus:outline-none flex flex-col justify-between w-8 h-6">
        <span class="block w-full h-1 bg-black"></span>
        <span class="block w-full h-1 bg-black"></span>
        <span class="block w-full h-1 bg-black"></span>
    </button>
        
        <div class="text-center">
            <h1 class="text-3xl font-normal tracking-tight leading-[0.8] text-black" style="font-family: 'Playfair Display', serif;">THE LOCAL PRODUCT</h1>
        </div>
        
        <a href="category.html" class="nav-link text-[10px] hover:underline">Back →</a>
    </header>

    <div id="sidebar" class="fixed top-[86px] left-0 h-full w-64 bg-[#1a1a1c] text-white z-40 transform -translate-x-full shadow-2xl">
        <div class="p-10">
            <ul class="text-[14px] uppercase tracking-[0.2em] space-y-10">
                <li class="group cursor-pointer">
                    <span class="text-gray-400">Kids</span>
                    <ul class="pl-6 mt-4 text-[11px] text-gray-500 space-y-3">
                        <li><a href="fashion/kids/clothes.html" class="hover:text-white transition-colors duration-200">Clothing</a></li>
                        <li><a href="fashion/kids/accessories.html" class="hover:text-white transition-colors duration-200">Accessories</a></li>
                    </ul>
                </li>
                <li class="group cursor-pointer">
                    <span class="text-gray-400">Women</span>
                    <ul class="pl-6 mt-4 text-[11px] text-gray-500 space-y-3">
                        <li><a href="fashion/women/clothes.html" class="hover:text-white transition-colors duration-200">Clothing</a></li>
                        <li><a href="fashion/women/accessories.html" class="hover:text-white transition-colors duration-200">Accessories</a></li>
                    </ul>
                </li>
                <li class="group cursor-pointer">
                    <span class="text-gray-400">Men</span>
                    <ul class="pl-6 mt-4 text-[11px] text-gray-500 space-y-3">
                        <li><a href="fashion/men/clothes.html" class="hover:text-white transition-colors duration-200">Clothing</a></li>
                        <li><a href="fashion/men/accessories.html" class="hover:text-white transition-colors duration-200">Accessories</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>

    <main class="w-full min-h-screen p-8 md:p-16 flex items-center justify-center">
        <div class="text-center text-white max-w-lg">
            <p class="italic text-2xl md:text-3xl font-light leading-relaxed" style="font-family: 'Playfair Display', serif;">
                "Fashion is what you're offered four times a year by designers. And style is what you choose."
            </p>
            <span class="block mt-6 text-xs uppercase tracking-[0.3em] opacity-70">— Coco Chanel</span>
        </div>
    </main>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 300);
        });

        const menuBtn = document.getElementById('menu-btn');
        const sidebar = document.getElementById('sidebar');

        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('-translate-x-full');
        });
    </script>
</body>
</html>
