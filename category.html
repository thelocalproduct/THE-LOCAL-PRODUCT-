<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOCAL PRODUCT | Collections</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0; 
            width: 100vw;
            background-color: #ffffff;
        }
        
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        .nav-link { 
            font-size: 0.70rem; 
            letter-spacing: 0.2em; 
            text-transform: uppercase; 
            color: #4a4a4a;
            transition: color 0.3s; 
        }
        .nav-link:hover { color: #000000; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="w-full px-6 pt-8 pb-8 flex justify-between items-center bg-white border-b border-gray-200">
        <!-- Placeholder for symmetry -->
        <div class="w-12"></div>
        
        <!-- Updated Title/Logo to match Main Header Style -->
        <div class="text-center">
            <h1 class="text-3xl font-normal tracking-tight leading-[0.8] text-black" style="font-family: 'Playfair Display', serif;">THE LOCAL PRODUCT</h1>
        </div>
        
        <!-- Back Button (Right Side) -->
        <a href="index.html" class="nav-link text-[10px] hover:underline">Back →</a>
    </header>

    <!-- Graphite Content Area -->
    <main class="w-full bg-[#1a1a1c] text-white">
        
        <!-- Collections Content -->
        <div class="flex flex-col items-center text-center w-full max-w-6xl mx-auto px-6 py-20">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full">
                
                <!-- Fashion Category Card -->
                <a href="fashion.html" class="group flex flex-col items-center justify-center p-16 md:p-24 border border-[#4a4f54] hover:border-[#ffffff] transition-all duration-500 bg-[#151515] hover:bg-[#000000]">
                    <span class="text-[9px] uppercase tracking-[0.3em] text-[#888] group-hover:text-[#c0c0c0] transition-colors mb-6">Apparel & Accessories</span>
                    <h3 class="text-4xl md:text-6xl font-normal mb-12 tracking-wide">Fashion</h3>
                    <button class="border border-transparent group-hover:border-[#ffffff] px-12 py-3 text-[10px] uppercase tracking-[0.2em] text-[#c0c0c0] group-hover:text-white transition-all duration-500">
                        Explore
                    </button>
                </a>

                <!-- Electronics Category Card -->
                <a href="shop.html" class="group flex flex-col items-center justify-center p-16 md:p-24 border border-[#4a4f54] hover:border-[#ffffff] transition-all duration-500 bg-[#151515] hover:bg-[#000000]">
                    <span class="text-[9px] uppercase tracking-[0.3em] text-[#888] group-hover:text-[#c0c0c0] transition-colors mb-6">Precision Technology</span>
                    <h3 class="text-4xl md:text-6xl font-normal mb-12 tracking-wide">Electronics</h3>
                    <button class="border border-transparent group-hover:border-[#ffffff] px-12 py-3 text-[10px] uppercase tracking-[0.2em] text-[#c0c0c0] group-hover:text-white transition-all duration-500">
                        Explore
                    </button>
                </a>

            </div>
        </div>

        <!-- Footer -->
        <footer class="w-full py-16 border-t border-[#4a4f54]">
            <div class="w-full max-w-6xl mx-auto px-6 grid grid-cols-2 md:grid-cols-4 gap-12 text-center text-[#c0c0c0]">
                <h4 class="font-bold text-[9px] uppercase tracking-[0.2em]">Best in Class</h4>
                <h4 class="font-bold text-[9px] uppercase tracking-[0.2em]">Expert Pick</h4>
                <h4 class="font-bold text-[9px] uppercase tracking-[0.2em]">Premium</h4>
                <h4 class="font-bold text-[9px] uppercase tracking-[0.2em]">Frequently</h4>
            </div>
        </footer>
    </main>

</body>
</html>
